<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Background -->
  <rect width="64" height="64" rx="10" fill="#1e1e2e"/>

  <!-- Magnet U-shape body -->
  <path d="M14 14 L14 36 A18 18 0 0 0 50 36 L50 14"
        fill="none" stroke="#5bc8f5" stroke-width="7"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Magnet left leg cap (red pole) -->
  <rect x="10" y="10" width="9" height="7" rx="2" fill="#f55" />
  <!-- Magnet right leg cap (blue pole) -->
  <rect x="45" y="10" width="9" height="7" rx="2" fill="#55aaff" />

  <!-- Snap target: small cube wireframe bottom-right -->
  <g transform="translate(33,36) scale(0.82)">
    <!-- cube faces -->
    <polygon points="0,10 14,10 20,4 6,4" fill="#2a2a3e" stroke="#5bc8f5" stroke-width="1.4"/>
    <polygon points="0,10 0,22 14,22 14,10" fill="#1a1a2e" stroke="#5bc8f5" stroke-width="1.4"/>
    <polygon points="14,10 14,22 20,16 20,4" fill="#222236" stroke="#5bc8f5" stroke-width="1.4"/>
  </g>

  <!-- Snap indicator dot (glowing) -->
  <circle cx="33" cy="36" r="3.5" fill="#ffffff" opacity="0.95"/>
  <circle cx="33" cy="36" r="5.5" fill="none" stroke="#5bc8f5" stroke-width="1.2" opacity="0.7"/>

  <!-- Attraction lines -->
  <line x1="22" y1="43" x2="30" y2="37.5" stroke="#5bc8f5" stroke-width="1.2"
        stroke-dasharray="2,2" opacity="0.6"/>
  <line x1="19" y1="48" x2="29" y2="39"   stroke="#5bc8f5" stroke-width="1"
        stroke-dasharray="2,2" opacity="0.4"/>
</svg>
